  /* Revealed monsters (right sidebar) */
  .revealed-list { padding: 8px; display: flex; flex-direction: column; gap: 8px; }
  .revealed-card {
    padding: 10px;
    background: linear-gradient(180deg, var(--bg-1), var(--bg-0));
    border: 1px solid var(--border-soft);
    border-left: 3px solid var(--blood);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: border-color 0.15s, transform 0.15s;
  }
  .revealed-card:hover {
    border-left-color: var(--blood-bright);
    transform: translateX(2px);
  }
  .revealed-header {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .revealed-name {
    font-weight: 600;
    font-size: 13px;
    color: var(--parchment);
    font-family: 'Cinzel', serif;
    letter-spacing: 0.04em;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .revealed-desc {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    line-height: 1.4;
    color: var(--ink);
  }
  /* v7.6: collapsible description toggle in the revealed list */
  .revealed-desc-toggle {
    display: inline-flex; align-items: center; gap: 5px;
    background: none; border: none; cursor: pointer; padding: 2px 0;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;
    font-weight: 600; color: var(--ink-mute); transition: color 0.12s;
  }
  .revealed-desc-toggle:hover { color: var(--gold); }
  .revealed-desc-chevron { font-size: 9px; width: 9px; }
  .revealed-conditions {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
  }

  /* Status labels (Strong / Rough / Waning / Down) - replaces exact HP for players */
  .status-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.08em;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    border: 1px solid;
    white-space: nowrap;
    display: inline-block;
  }
  .status-strong { color: #7ad483; border-color: #4d8f52; background: rgba(76,175,80,0.12); }
  .status-rough  { color: #f0c564; border-color: #a6822a; background: rgba(255,193,7,0.1); }
  .status-waning { color: #e8886a; border-color: #a64a2e; background: rgba(255,100,60,0.12); }
  .status-down   { color: #7a7a7a; border-color: #444;   background: rgba(70,70,70,0.2); border-style: dashed; }

  .init-status {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.08em;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 8px;
    text-transform: uppercase;
    margin-left: auto;
    border: 1px solid;
  }
  .init-status.status-strong { color: #7ad483; border-color: #4d8f52; background: rgba(76,175,80,0.1); }
  .init-status.status-rough  { color: #f0c564; border-color: #a6822a; background: rgba(255,193,7,0.08); }
  .init-status.status-waning { color: #e8886a; border-color: #a64a2e; background: rgba(255,100,60,0.1); }
  .init-status.status-down   { color: #7a7a7a; border-color: #444;   background: rgba(70,70,70,0.15); border-style: dashed; }

  /* "YOU" badge */
  .own-pc-badge {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 1px 5px;
    border-radius: 8px;
    background: var(--gold);
    color: var(--bg-deep);
    border: 1px solid var(--gold-bright);
  }

  /* ================================================================
     v2 - TOKEN SHAPES for new entity types (Familiar / Neutral Beast /
     Object). Each gets a distinct silhouette so the map stays readable
     at a glance alongside the existing PC/Monster/NPC shapes.
     ================================================================ */
  /* Wrapper that carries the per-token scale factor (set inline as
     --token-scale). We scale the inner content, NOT the outer .token,
     so left/top keep pointing at the token's world coordinate. */
  .token-inner {
    transform: scale(var(--token-scale, 1));
    transform-origin: center center;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Familiar - teardrop / leaf (rounded on top, pointed at bottom) */
  /* v8.10: the familiar teardrop used to be a -45deg-rotated container with the
     inner image counter-rotated +45deg - but it was never scaled/clipped to
     fill the rotated outline (the way the monster diamond is), so the portrait
     sat misaligned. Render the teardrop upright instead: the image fills it
     naturally via object-fit + border-radius, with no rotation on the image. */
  .token-shape.familiar {
    border-radius: 50% 50% 10% 50%;
    transform: none;
  }
  .token-shape.familiar > span,
  .token-shape.familiar > img { transform: none; display: block; }
  .token-shape.familiar .token-portrait { border-radius: inherit; }

  /* Neutral Beast - horizontal ellipse */
  .token-shape.neutral-beast {
    border-radius: 50%;
    width: 40px; height: 32px;
    border-width: 2.5px;
    border-style: solid;
    box-shadow:
      0 3px 10px rgba(0,0,0,0.5),
      inset 0 2px 3px rgba(255,255,255,0.15),
      inset 0 -2px 3px rgba(0,0,0,0.2);
  }

  /* Object - hexagon */
  .token-shape.object {
    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    border-radius: 0;
    border-width: 0;
    box-shadow: 0 3px 10px rgba(0,0,0,0.6);
  }
  .token-shape.object::before {
    content: '';
    position: absolute;
    inset: 2px;
    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    border: 2px solid rgba(255,255,255,0.2);
    pointer-events: none;
  }

  /* Portrait image - masked to the token shape. Sits inside .token-shape. */
  .token-portrait {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: inherit;
    display: block;
  }
  .token-shape.pc .token-portrait { border-radius: 50%; }
  .token-shape.monster .token-portrait,
  .token-shape.npc .token-portrait { border-radius: 4px; }
  /* v7.5 FIX: the monster shape is a square rotated 45° (a diamond), so a
     portrait <img> inside it inherited that 45° tilt. Counter-rotate the
     image back to upright and scale it by √2 so it still fills the diamond,
     then clip it to the diamond so the (now-upright, square) image's corners
     don't poke out past the token edges. The span initial is already
     counter-rotated above; the diamond's border, bevel and selection
     outline are untouched. */
  .token-shape.monster > img.token-portrait {
    transform: rotate(-45deg) scale(1.41421);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    border-radius: 0;
  }

  /* ================================================================
     v2 - STATUS LINE below token label (major conditions only)
     ================================================================ */
  .token-status-line {
    position: absolute;
    left: 50%;
    bottom: -32px;
    transform: translateX(-50%);
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--blood-bright);
    background: rgba(7,9,15,0.85);
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
    pointer-events: none;
    border: 1px solid var(--border-soft);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .token-status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.3);
  }

  /* ================================================================
     v2 - TOKEN HOVER TOOLTIP
     ================================================================ */
  .token-tooltip {
    position: fixed;
    z-index: 300;
    min-width: 180px;
    max-width: 280px;
    background: linear-gradient(180deg, var(--bg-1), var(--bg-0));
    border: 1px solid var(--gold-dim);
    border-radius: 6px;
    padding: 8px 10px;
    box-shadow: var(--shadow-deep);
    font-family: 'Inter', sans-serif;
    pointer-events: none;
    animation: tooltipFadeIn 0.12s ease;
  }
  @keyframes tooltipFadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .token-tooltip-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 4px;
  }
  .token-tooltip-name {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 0.04em;
  }
  .token-tooltip-type {
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 1px 6px;
    border-radius: 8px;
    border: 1px solid var(--border-soft);
    color: var(--ink-dim);
  }
  .token-tooltip-type.type-pc      { color: var(--azure); border-color: var(--azure); }
  .token-tooltip-type.type-monster { color: var(--blood-bright); border-color: var(--blood); }
  .token-tooltip-type.type-familiar { color: var(--emerald); border-color: var(--emerald); }
  .token-tooltip-type.type-neutral-beast { color: var(--amber); border-color: var(--amber); }
  .token-tooltip-type.type-object { color: var(--ink-dim); border-color: var(--ink-mute); }
  .token-tooltip-hp {
    font-size: 12px;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .token-tooltip-desc {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    line-height: 1.4;
    color: var(--ink);
    margin-top: 4px;
    white-space: pre-wrap;
  }
  .token-tooltip-conds {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    margin-top: 6px;
  }

  /* ================================================================
     v2 - REMINDER PIN (private)
     ================================================================ */
  .reminder-pin {
    position: absolute;
    width: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 4;
    cursor: pointer;
    opacity: 0.82;
    transition: opacity 0.15s, transform 0.15s;
  }
  .reminder-pin:hover { opacity: 1; transform: translateY(-2px); }
  .reminder-pin-body {
    font-size: 18px;
    line-height: 1;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    color: currentColor;
  }
  .reminder-pin-label {
    margin-top: 2px;
    max-width: 140px;
    background: rgba(7,9,15,0.85);
    color: var(--on-dark);
    font-size: 10px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    padding: 1px 5px;
    border-radius: 2px;
    border: 1px dashed var(--gold-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  /* v7.6: per-viewer reminder editor popover */
  .reminder-edit-backdrop { position: fixed; inset: 0; z-index: 600; background: transparent; }
  .reminder-edit-pop {
    position: fixed; z-index: 601; width: 228px;
    background: linear-gradient(180deg, var(--bg-1), var(--bg-0));
    border: 1px solid var(--gold-dim); border-radius: 9px;
    box-shadow: var(--shadow-deep); padding: 11px; animation: fadeIn 0.12s ease;
  }
  .reminder-edit-head {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Cinzel', serif; font-size: 12px; font-weight: 600; color: var(--gold);
    letter-spacing: 0.04em; margin-bottom: 8px;
  }
  .reminder-edit-x {
    margin-left: auto; background: none; border: none; color: var(--ink-mute);
    font-size: 17px; line-height: 1; cursor: pointer; padding: 0 2px;
  }
  .reminder-edit-x:hover { color: var(--ink); }
  .reminder-edit-label {
    width: 100%; box-sizing: border-box; margin-bottom: 9px;
    background: var(--bg-0); border: 1px solid var(--border-soft); border-radius: 5px;
    color: var(--ink); font-size: 12px; padding: 6px 8px; font-family: inherit;
  }
  .reminder-edit-label:focus { outline: none; border-color: var(--gold-dim); }
  .reminder-edit-row-label {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.07em; font-weight: 700;
    color: var(--ink-mute); margin-bottom: 5px;
  }
  .reminder-size-val { color: var(--gold); font-weight: 700; }
  .reminder-swatches { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .reminder-swatch {
    width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; box-shadow: 0 0 0 1px rgba(0,0,0,0.4) inset; transition: transform 0.1s;
  }
  .reminder-swatch:hover { transform: scale(1.12); }
  .reminder-swatch.active { border-color: var(--ink); box-shadow: 0 0 0 2px var(--bg-0), 0 0 0 4px var(--gold); }
  .reminder-size-slider { width: 100%; margin: 0 0 10px; accent-color: var(--gold); cursor: pointer; }
  .reminder-edit-actions { display: flex; gap: 6px; }
  .reminder-edit-actions .btn { flex: 1; }
  .btn.sm.ghost.danger { color: #d9776f; border-color: color-mix(in srgb, #c43e3e 40%, transparent); }
  .btn.sm.ghost.danger:hover { background: rgba(196,62,62,0.18); color: #f0b0b0; }
  .reminder-edit-hint {
    margin-top: 8px; font-size: 10px; font-style: italic;
    color: var(--ink-mute); text-align: center; font-family: 'Cormorant Garamond', serif;
  }

  /* ================================================================
     v2 - SICKNESS visual effects on player canvas
     25% desaturation per level + deepening vignette. Applied as a
     class on .canvas-container so only the player's map dims -
     the sidebars, topbar, and UI chrome stay legible.
     v6 fix #6: these filters now target the .canvas-wrap (map only),
     not the canvas-container, so floating panels inside the container
     don't inherit the darkening. See duplicate block below.
     ================================================================ */
  .canvas-container { transition: filter 0.6s ease; }

  .sickness-vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 90;
    opacity: 0;
    transition: opacity 0.6s ease, box-shadow 0.6s ease;
    mix-blend-mode: multiply;
  }
  .sickness-vignette.sick-level-1 {
    opacity: 1;
    box-shadow: inset 0 0 120px 20px rgba(30,20,10,0.35);
  }
  .sickness-vignette.sick-level-2 {
    opacity: 1;
    box-shadow: inset 0 0 180px 40px rgba(20,10,5,0.55);
  }
  .sickness-vignette.sick-level-3 {
    opacity: 1;
    box-shadow: inset 0 0 240px 70px rgba(10,5,2,0.78);
  }

  /* Sickness picker (DM editor) */
  .sickness-picker {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .sickness-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 8px 6px;
    background: var(--bg-0);
    border: 1px solid var(--border-soft);
    border-radius: 4px;
    cursor: pointer;
    color: var(--ink-dim);
    font-family: inherit;
    transition: all 0.15s;
  }
  .sickness-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  .sickness-btn.active {
    background: rgba(212,165,116,0.12);
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 0 1px var(--gold-dim);
  }
  .sickness-btn.sick-level-0 { --sick-tint: transparent; }
  .sickness-btn.sick-level-1 { --sick-tint: rgba(180,160,100,0.12); }
  .sickness-btn.sick-level-2 { --sick-tint: rgba(160,120,70,0.18); }
  .sickness-btn.sick-level-3 { --sick-tint: rgba(100,70,40,0.28); }
  .sickness-btn.sick-level-1.active,
  .sickness-btn.sick-level-2.active,
  .sickness-btn.sick-level-3.active { background: var(--sick-tint); }
  .sickness-num {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 700;
  }
  .sickness-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-align: center;
  }

  /* Sickness note on player's own sheet */
  .sickness-note {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    background: var(--bg-0);
    border: 1px solid var(--border-soft);
    border-left: 3px solid var(--gold-dim);
    border-radius: 2px;
    margin-bottom: 10px;
    color: var(--ink);
  }
  .sickness-note.sick-level-1 { border-left-color: var(--amber); }
  .sickness-note.sick-level-2 { border-left-color: var(--amber); color: var(--ink-dim); }
  .sickness-note.sick-level-3 { border-left-color: var(--blood); color: var(--blood-bright); }
  .sickness-glyph {
    font-size: 18px;
    color: var(--gold);
    opacity: 0.7;
  }
  .sickness-note.sick-level-3 .sickness-glyph { color: var(--blood-bright); opacity: 1; }

  /* ================================================================
     v2 - SETTINGS MODAL
     ================================================================ */
  .settings-section {
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border-soft);
  }
  .settings-section:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
  .settings-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    display: block;
    margin-bottom: 8px;
  }
  .settings-label-sub {
    font-family: 'Inter', sans-serif;
    color: var(--ink-mute);
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
  }
  .settings-hint {
    font-size: 11px;
    color: var(--ink-dim);
    line-height: 1.4;
    margin-top: 6px;
  }
  .theme-switch {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .theme-option {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 14px 10px;
    background: var(--bg-0);
    border: 1px solid var(--border-soft);
    border-radius: 6px;
    cursor: pointer;
    color: var(--ink);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.04em;
    transition: all 0.15s;
  }
  .theme-option:hover {
    border-color: var(--gold-dim);
    background: var(--bg-1);
  }
  .theme-option.active {
    border-color: var(--gold);
    background: rgba(212,165,116,0.08);
    box-shadow: 0 0 0 1px var(--gold-dim);
  }
  .theme-swatch {
    width: 64px; height: 40px;
    border-radius: 4px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .theme-swatch.dark  { background: linear-gradient(135deg, #1c243d 0%, #07090f 80%); }
  .theme-swatch.forest { background: linear-gradient(135deg, #213d26 0%, #8fb45a 90%); }
  .theme-swatch.darkcherry { background: linear-gradient(135deg, #2a0b14 0%, #e3506e 90%); }
  .theme-swatch.ocean { background: linear-gradient(135deg, #0a1c2e 0%, #3fb6d6 90%); }
  .theme-swatch.light { background: linear-gradient(135deg, #e4d3b0 0%, #8a6a42 80%); }
  .theme-swatch.cherry { background: linear-gradient(135deg, #fdeef2 0%, #c14a7b 85%); }
  .theme-swatch.river  { background: linear-gradient(135deg, #eef5fb 0%, #1f5d86 85%); }
  .theme-swatch.meadow { background: linear-gradient(135deg, #f1f7e6 0%, #4a7c1f 85%); }
  .theme-sub {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: var(--ink-mute);
    letter-spacing: 0;
    text-transform: none;
  }

  /* Scale slider row (DM settings and per-token) */
  .scale-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .scale-row input[type="range"] {
    flex: 1;
    accent-color: var(--gold);
  }
  .scale-value {
    min-width: 44px;
    text-align: right;
    font-size: 12px;
    color: var(--gold);
  }

  /* ================================================================
     v2 - EDIT MY SHEET MODAL
     ================================================================ */
  .sheet-tabs {
    display: flex;
    gap: 4px;
    padding: 4px;
    background: var(--bg-0);
    border-radius: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .sheet-tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 4px;
    color: var(--ink-dim);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.12s;
  }
  .sheet-tab:hover { color: var(--gold); background: rgba(212,165,116,0.06); }
  .sheet-tab.active {
    background: var(--bg-2);
    border-color: var(--border);
    color: var(--parchment);
  }
  .sheet-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 12px;
  }
  .sheet-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 6px;
    background: var(--bg-0);
    border: 1px solid var(--border-soft);
    border-radius: 4px;
  }
  .sheet-stat > span {
    font-size: 9px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .sheet-stat > b {
    font-size: 15px;
    color: var(--parchment);
    font-weight: 600;
  }

  /* ================================================================
     v2 - BADGES
     ================================================================ */
  .familiar-badge {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 1px 5px;
    border-radius: 8px;
    background: var(--emerald);
    color: #07190d;
    border: 1px solid rgba(255,255,255,0.25);
  }
  .familiar-badge.dim {
    background: transparent;
    color: var(--emerald);
    border-color: var(--emerald);
    opacity: 0.7;
  }
  /* v7.9: a PC temporarily lent to a player for control */
  .familiar-badge.loan-badge { background: #5a8ec9; color: #04121f; }
  .claim-loan-select {
    width: 100%; margin: 4px 0 2px 20px; max-width: calc(100% - 20px);
    font-size: 11px; padding: 3px 6px; background: var(--bg-0);
    border: 1px dashed var(--border-soft); border-radius: 6px; color: var(--ink-dim);
  }

  /* ================================================================
     v2 - DM CLAIMS PANEL
     ================================================================ */
  .claim-row {
    padding: 10px;
    background: var(--bg-1);
    border: 1px solid var(--border-soft);
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .claim-row-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .claim-peer-name {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--gold);
  }
  .claim-peer-id {
    font-size: 10px;
    color: var(--ink-mute);
  }
  /* v7.6: DM per-player theme control */
  .claim-theme-row, .claim-theme-all {
    display: flex; align-items: center; gap: 8px; margin: 6px 0 2px;
  }
  .claim-theme-all {
    padding: 8px; margin: 0 0 4px; border-radius: 7px;
    background: color-mix(in srgb, var(--gold) 8%, var(--bg-0));
    border: 1px solid var(--border-soft);
  }
  .claim-theme-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 700; color: var(--ink-dim); white-space: nowrap;
  }
  .claim-theme-all .claim-theme-label { color: var(--gold); }
  .claim-theme-select {
    flex: 1; min-width: 0; padding: 4px 7px; border-radius: 5px;
    background: var(--bg-0); border: 1px solid var(--border-soft);
    color: var(--ink); font-family: inherit; font-size: 12px; cursor: pointer;
  }
  .claim-theme-select:hover { border-color: var(--gold-dim); }
  .claim-theme-select:focus { outline: none; border-color: var(--gold-dim); }
  .claim-badge {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 1px 6px;
    border-radius: 8px;
    text-transform: uppercase;
    border: 1px solid;
  }
  .claim-badge.spectator {
    color: var(--ink-dim);
    border-color: var(--border);
    background: var(--bg-0);
  }
  .claim-entity-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    font-size: 13px;
  }

  /* ================================================================
     v2 - PLAYER ONBOARDING GATE
     ================================================================ */
  .onboarding-overlay {
    position: fixed;
    inset: 0;
    background: var(--canvas-backdrop);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 400;
    padding: 20px;
    overflow-y: auto;
  }
  .onboarding-overlay::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--vignette-bg);
    pointer-events: none;
  }
  .onboarding-card {
    position: relative;
    max-width: 540px;
    width: 100%;
    max-height: calc(100vh - 100px);
    overflow-y: auto;
    background: linear-gradient(180deg, var(--bg-1), var(--bg-0));
    border: 1px solid var(--gold-dim);
    border-radius: 10px;
    padding: 34px 28px;
    box-shadow: var(--shadow-deep), var(--glow-gold);
    animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  /* v7.6: onboarding "confirming your selection" processing state */
  @keyframes onbSpin { to { transform: rotate(360deg); } }
  .onboarding-spinner {
    width: 46px; height: 46px; border-radius: 50%;
    border: 4px solid color-mix(in srgb, var(--gold) 25%, transparent);
    border-top-color: var(--gold);
    animation: onbSpin 0.8s linear infinite;
  }
  .onboarding-mini-spinner {
    width: 20px; height: 20px; border-radius: 50%; flex: 0 0 auto;
    border: 3px solid color-mix(in srgb, var(--gold) 25%, transparent);
    border-top-color: var(--gold);
    animation: onbSpin 0.7s linear infinite;
  }
  .onboarding-pc.is-claiming {
    border-color: var(--gold) !important;
    background: color-mix(in srgb, var(--gold) 12%, var(--bg-0)) !important;
  }
  .onboarding-claiming {
    position: absolute; inset: 0; z-index: 5;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    background: color-mix(in srgb, var(--bg-0) 82%, transparent);
    backdrop-filter: blur(3px);
    border-radius: 10px;
    animation: fadeIn 0.18s ease;
  }
  .onboarding-claiming-text {
    font-family: 'Cinzel', serif; font-size: 17px; color: var(--gold); letter-spacing: 0.04em; text-align: center;
  }
  .onboarding-claiming-sub {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 14px; color: var(--ink-dim);
  }
  .onboarding-title {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.06em;
    text-align: center;
    margin-bottom: 6px;
  }
  .onboarding-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;
    text-align: center;
    color: var(--ink-dim);
    margin-bottom: 24px;
  }
  .onboarding-section { margin-bottom: 18px; }
  .onboarding-section-title {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 10px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border-soft);
  }
  .onboarding-search {
    width: 100%;
    padding: 8px 10px;
    background: var(--bg-0);
    border: 1px solid var(--border-soft);
    border-radius: 4px;
    color: var(--ink);
    font-family: inherit;
    font-size: 13px;
    margin-bottom: 10px;
  }
  .onboarding-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .onboarding-pc {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px;
    background: var(--bg-0);
    border: 1px solid var(--border-soft);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .onboarding-pc:hover {
    border-color: var(--gold);
    background: var(--bg-2);
    transform: translateX(2px);
  }
  .onboarding-divider {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--ink-mute);
    margin: 14px 0;
    position: relative;
  }
  .onboarding-divider::before,
  .onboarding-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 30%;
    height: 1px;
    background: var(--border-soft);
  }
  .onboarding-divider::before { left: 8%; }
  .onboarding-divider::after  { right: 8%; }
  .onboarding-actions {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* v7.6: player-facing new-character builder */
  .builder { display: flex; flex-direction: column; gap: 12px; }
  .builder-row { display: flex; gap: 10px; }
  .builder-field { display: flex; flex-direction: column; gap: 4px; }
  .builder-field.grow { flex: 1; min-width: 0; }
  .builder-field > label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--gold); font-weight: 700; font-family: 'Cinzel', serif;
  }
  .builder-field input {
    padding: 8px 10px; border-radius: 6px; background: var(--bg-0);
    border: 1px solid var(--border-soft); color: var(--ink); font-family: inherit; font-size: 14px;
  }
  .builder-field input:focus { outline: none; border-color: var(--gold-dim); }
  .builder-abilities-head {
    display: flex; align-items: center; justify-content: space-between;
    font-family: 'Cinzel', serif; font-weight: 700; font-size: 13px; color: var(--ink);
  }
  .builder-hint { font-family: inherit; font-weight: 400; font-size: 11px; color: var(--ink-mute); }
  .builder-reroll {
    padding: 5px 12px; border-radius: 7px; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 700;
    background: color-mix(in srgb, var(--gold) 16%, var(--bg-2)); border: 1px solid var(--gold-dim); color: var(--gold);
    transition: all 0.12s;
  }
  .builder-reroll:hover:not(:disabled) { background: color-mix(in srgb, var(--gold) 30%, var(--bg-2)); }
  .builder-reroll:disabled { opacity: 0.5; cursor: not-allowed; }
  .builder-abilities { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .builder-ability {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    background: var(--bg-0); border: 1px solid var(--border-soft); border-radius: 8px; padding: 8px 4px;
  }
  .ba-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-mute); font-weight: 700; }
  .ba-score { font-size: 22px; font-weight: 800; color: var(--ink); font-family: 'Cinzel', serif; line-height: 1.1; }
  .ba-mod { font-size: 11px; color: var(--gold); font-family: 'JetBrains Mono', monospace; }
  .builder-meta {
    display: flex; gap: 18px; justify-content: center; padding: 8px;
    background: color-mix(in srgb, var(--gold) 7%, var(--bg-0)); border: 1px solid var(--border-soft); border-radius: 8px;
  }
  .builder-meta-item { font-size: 14px; color: var(--ink-dim); }
  .builder-meta-item b { color: var(--ink); font-size: 16px; }
  .builder-actions { display: flex; gap: 8px; justify-content: space-between; }
  @media (max-width: 520px) {
    .builder-row { flex-direction: column; }
    .builder-abilities { grid-template-columns: repeat(3, 1fr); }
  }

  /* ===== v7.8 - multi-phase character creator ===== */
  .builder.cc { gap: 10px; }
  .cc-head { display: flex; align-items: center; justify-content: space-between; }
  .cc-steps { display: flex; gap: 6px; }
  .cc-step { flex: 1; text-align: center; font-size: 11px; font-weight: 700; padding: 6px 4px; border-radius: 6px;
    background: var(--bg-0); border: 1px solid var(--border-soft); color: var(--ink-mute); }
  .cc-step.on { background: color-mix(in srgb, var(--gold) 22%, var(--bg-0)); border-color: var(--gold-dim); color: var(--gold); }
  .cc-step.done { color: var(--ink-dim); border-color: var(--gold-dim); }
  .cc-body { display: flex; flex-direction: column; gap: 12px; }
  .cc-sub { font-size: 12px; color: var(--ink-dim); }
  .cc-info { background: color-mix(in srgb, var(--gold) 7%, var(--bg-0)); border: 1px solid var(--border-soft);
    border-radius: 8px; padding: 10px; font-size: 12px; color: var(--ink-dim); display: flex; flex-direction: column; gap: 4px; line-height: 1.5; }
  .cc-info b { color: var(--ink); }
  .cc-info-bonus { color: var(--gold); }
  .cc-hb-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
  .cc-hb-field { display: flex; flex-direction: column; gap: 4px; }
  .cc-hb-field.grow { flex: 1; min-width: 150px; }
  .cc-hb-field label { font-size: 12px; color: var(--ink-dim); margin: 0; }
  .cc-hb-field select.class-select { min-width: 112px; }
  .cc-hb-speed { display: flex; align-items: center; gap: 6px; }
  .cc-hb-speed input { width: 84px; }
  .cc-hb-speed span { font-size: 12px; color: var(--ink-dim); }
  .cc-hb-traits { width: 100%; resize: vertical; font-family: inherit; line-height: 1.4; }
  .cc-class { max-height: 240px; overflow: auto; }
  .cc-locked { color: var(--gold); font-weight: 600; align-self: center; }

  .cc-roll-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  @media (max-width: 520px) { .cc-roll-grid { grid-template-columns: repeat(2, 1fr); } }
  .roll-slot { background: var(--bg-0); border: 1px solid var(--border-soft); border-radius: 8px; padding: 10px;
    min-height: 92px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
  .roll-slot.done { border-color: var(--gold-dim); }
  .roll-slot-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-mute); font-weight: 700; }
  .roll-go { padding: 6px 14px; border-radius: 7px; cursor: pointer; font-weight: 700; font-size: 12px;
    background: color-mix(in srgb, var(--gold) 18%, var(--bg-2)); border: 1px solid var(--gold-dim); color: var(--gold); }
  .roll-go:hover:not(:disabled) { background: color-mix(in srgb, var(--gold) 32%, var(--bg-2)); }
  .roll-final { font-size: 34px; font-weight: 800; color: var(--gold); font-family: 'Cinzel', serif; line-height: 1;
    animation: rollGlow 0.75s cubic-bezier(.2,1.4,.4,1) forwards; }
  @keyframes rollPop { 0% { transform: scale(0.2); opacity: 0; } 70% { transform: scale(1.25); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes rollGlow {
    0%   { transform: scale(0.2); opacity: 0; text-shadow: 0 0 0 transparent; }
    55%  { transform: scale(1.3); opacity: 1; text-shadow: 0 0 18px var(--gold), 0 0 36px color-mix(in srgb, var(--gold) 55%, transparent); }
    100% { transform: scale(1); opacity: 1; text-shadow: 0 0 9px color-mix(in srgb, var(--gold) 55%, transparent); } }
  .roll-dice { display: flex; gap: 5px; }
  .roll-die { position: relative; width: 30px; height: 30px; border-radius: 5px; display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 16px; background: var(--bg-2); border: 1px solid var(--border-soft); color: var(--ink);
    font-family: 'JetBrains Mono', monospace; transition: transform 0.4s ease, opacity 0.4s ease; }
  .roll-die.spin { animation: dieSpin 0.2s infinite; color: var(--ink-dim); }
  @keyframes dieSpin { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
  .roll-die.set { border-color: var(--gold-dim); }
  .roll-die.low { color: var(--ink-mute); }
  .roll-die.struck { opacity: 0.45; }
  .roll-strike { position: absolute; left: 2px; right: 2px; top: 50%; height: 2px; background: var(--danger, #c0506a);
    transform: scaleX(0); transform-origin: left; animation: strikeIn 0.35s forwards; border-radius: 2px; }
  @keyframes strikeIn { to { transform: scaleX(1); } }
  .roll-die.smash { animation: dieSmash 0.85s cubic-bezier(.5,-0.4,.5,1.4) forwards; }
  @keyframes dieSmash {
    0% { transform: translateX(0); box-shadow: 0 0 0 0 transparent; }
    55% { transform: translateX(0); box-shadow: 0 0 0 0 transparent; }
    78% { transform: translateX(var(--smash, 0)); border-color: var(--gold);
      box-shadow: 0 0 16px 3px color-mix(in srgb, var(--gold) 80%, transparent); }
    100% { transform: translateX(0) scale(0.9); opacity: 0.85;
      box-shadow: 0 0 7px 1px color-mix(in srgb, var(--gold) 45%, transparent); } }
  .roll-die:nth-child(1).smash { --smash: 18px; }
  .roll-die:nth-child(2).smash { --smash: 8px; }
  .roll-die:nth-child(3).smash { --smash: -8px; }
  .roll-die:nth-child(4).smash { --smash: -18px; }
  /* v7.9: dice-tool roll animation overlay (reuses .roll-die spin/set). */
  .dice-roll-anim {
    position: absolute; inset: 0; z-index: 20; border-radius: inherit;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    background: color-mix(in srgb, var(--bg-0) 88%, transparent);
    backdrop-filter: blur(3px); animation: fadeIn 0.15s ease; }
  .dice-roll-dice { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; max-width: 92%; }
  .dice-roll-dice.dense .roll-die { width: 24px; height: 24px; font-size: 12px; border-radius: 4px; }
  .dice-roll-anim .roll-die.set {
    border-color: var(--gold-dim); color: var(--gold-bright);
    box-shadow: 0 0 10px 1px color-mix(in srgb, var(--gold) 45%, transparent);
    animation: dieLand 0.28s cubic-bezier(.2,.9,.3,1.5); }
  @keyframes dieLand { 0% { transform: scale(1.35); } 60% { transform: scale(0.92); } 100% { transform: scale(1); } }
  .dice-roll-total {
    font-family: 'Cinzel', serif; font-weight: 800; font-size: 30px; color: var(--gold-bright);
    opacity: 0; transform: scale(0.5);
    transition: opacity 0.25s ease, transform 0.3s cubic-bezier(.2,.9,.3,1.5);
    text-shadow: 0 0 16px color-mix(in srgb, var(--gold) 60%, transparent); }
  .dice-roll-total::before { content: '= '; color: var(--ink-dim); font-weight: 600; }
  .dice-roll-total.show { opacity: 1; transform: scale(1); }

  .cc-assign { display: flex; flex-direction: column; gap: 6px; padding-top: 4px; border-top: 1px solid var(--border-soft); }
  .cc-assign-row { display: flex; align-items: center; gap: 10px; }
  .cc-assign-label { width: 42px; font-size: 11px; font-weight: 700; color: var(--gold); }
  .cc-assign-row .class-select { flex: 1; }
  .cc-assign-mod { width: 36px; text-align: right; font-family: 'JetBrains Mono', monospace; color: var(--ink-dim); }

  .hp-roller { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 12px;
    min-height: 156px; justify-content: center;
    background: var(--bg-0); border: 1px solid var(--border-soft); border-radius: 8px; }
  .hp-final { font-size: 16px; color: var(--ink-dim); } .hp-final b { font-size: 30px; color: var(--gold); font-family: 'Cinzel', serif; }
  .hp-stage { height: 52px; display: flex; align-items: center; justify-content: center; }
  .hp-cur { font-size: 40px; font-weight: 800; color: var(--gold); font-family: 'JetBrains Mono', monospace; animation: rollPop 0.3s; }
  .hp-steps { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; min-height: 22px; }
  .hp-step { font-size: 10px; padding: 3px 7px; border-radius: 5px; background: var(--bg-2); border: 1px solid var(--border-soft); color: var(--ink-dim); }
  .cc-summary { font-size: 13px; color: var(--ink-dim); text-align: center; }
  .cc-lockin { background: color-mix(in srgb, var(--gold) 8%, var(--bg-0)); border: 1px solid var(--gold-dim); border-radius: 8px; padding: 14px; margin-bottom: 12px; text-align: center; }
  .cc-lockin-title { font-size: 16px; font-weight: 700; color: var(--gold-bright); margin-bottom: 6px; }
  .cc-summary-stats { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 6px; font-size: 11px; font-family: 'JetBrains Mono', monospace; }

  .grant-status { flex: 1; text-align: center; padding: 10px; border-radius: 8px; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .grant-status.pending { background: color-mix(in srgb, var(--gold) 10%, var(--bg-0)); border: 1px solid var(--gold-dim); color: var(--gold); }
  .grant-status.rejected { background: color-mix(in srgb, var(--danger, #c0506a) 10%, var(--bg-0)); border: 1px solid var(--danger, #c0506a); color: var(--danger, #c0506a); }

  /* ===== v7.8 - DM request popups ===== */
  .req-overlay { position: fixed; right: 16px; bottom: 16px; z-index: 4000; display: flex; flex-direction: column; gap: 10px; max-width: 300px; }
  /* v8.5 - centered player-request modal (new character / token placement) */
  .req-center-overlay { position: fixed; inset: 0; z-index: 4200; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); padding: 20px; }

  .dock-tabs { display: flex; gap: 4px; padding: 6px; }

  /* v8.6 - compact character sheet for the right dock */

  .csc-hp-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }

  .csc-vital-lbl { display: block; font-size: 9px; letter-spacing: 0.1em; color: var(--ink-mute); font-weight: 700; }
  .csc-vital-val { display: block; font-size: 20px; font-weight: 700; color: var(--gold); margin-top: 2px; }
  .csc-ability-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .csc-ab { background: var(--bg-0); border: 1px solid var(--border-soft); border-radius: 8px; padding: 7px 2px; text-align: center; }
  .csc-ab-name { display: block; font-size: 9px; letter-spacing: 0.08em; color: var(--ink-mute); font-weight: 700; }

  .layer-row { display: flex; align-items: center; gap: 8px; padding: 7px 4px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--border-soft); }
  .layer-row:last-child { border-bottom: none; }

  .layer-row span:nth-child(2) { flex: 1; }
  .layer-state { font-size: 10px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.06em; }
  /* v8.6 - character creation: background + story */
  .cc-bg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; margin: 8px 0; }
  .cc-bg-card { text-align: left; padding: 10px; border-radius: 8px; border: 1px solid var(--border-soft); background: var(--bg-0); cursor: pointer; transition: all 0.12s; display: flex; flex-direction: column; gap: 3px; }
  .cc-bg-card:hover { border-color: var(--gold-dim); }
  .cc-bg-card.on { border-color: var(--gold-bright); background: color-mix(in srgb, var(--gold) 12%, var(--bg-0)); }
  .cc-bg-name { font-family: 'Cinzel', serif; font-weight: 700; font-size: 13px; color: var(--gold); }
  .cc-bg-blurb { font-size: 11px; color: var(--ink-dim); line-height: 1.3; }

  .cc-story { display: flex; flex-direction: column; gap: 10px; margin: 8px 0; }

  /* v8.7 - radial token action menu */
  .radial-overlay { position: fixed; inset: 0; z-index: 320; background: rgba(0,0,0,0.28); }
  .radial-ring { position: absolute; width: 0; height: 0; }
  .radial-hub { position: absolute; left: 0; top: 0; transform: translate(-50%, -50%); width: 84px; height: 84px; border-radius: 50%; background: radial-gradient(circle at 50% 40%, var(--bg-1), var(--bg-0)); border: 2px solid var(--gold-dim); box-shadow: 0 8px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
  .radial-hub-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; font-family: 'Cinzel', serif; overflow: hidden; }
  .radial-hub-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .radial-hub-name { font-size: 8px; max-width: 76px; text-align: center; color: var(--ink-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .radial-hub-close { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg-1); color: var(--ink-dim); cursor: pointer; font-size: 13px; line-height: 1; display: flex; align-items: center; justify-content: center; }
  .radial-hub-close:hover { color: var(--danger); border-color: var(--danger); }
  .radial-seg { position: absolute; left: 0; top: 0; width: 62px; height: 62px; border-radius: 50%; background: var(--bg-1); border: 1px solid var(--gold-dim); color: var(--ink); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; box-shadow: 0 6px 20px rgba(0,0,0,0.45); transition: background 0.12s, border-color 0.12s; animation: radialPop 0.18s cubic-bezier(0.16,1,0.3,1); }
  .radial-seg:hover { background: var(--bg-0); border-color: var(--gold-bright); }
  .radial-seg.on { background: var(--gold); border-color: var(--gold-bright); color: #1a1205; }
  .radial-seg-ic { font-size: 20px; line-height: 1; }
  .radial-seg-lbl { font-size: 9px; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 700; }
  @keyframes radialPop { from { opacity: 0; transform: translate(-50%, -50%) scale(0.4); } }
  /* v8.8 - armour, shields, hands */
  .hands-readout { font-size: 10px; font-weight: 600; color: var(--gold-dim); margin-left: 8px; letter-spacing: 0.02em; }
  .wpn-hands { font-size: 11px; padding: 2px 4px; border-radius: 4px; background: var(--bg-0); border: 1px solid var(--border-soft); color: var(--ink-dim); }
  .armor-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .armor-lbl { font-size: 11px; color: var(--ink-dim); width: 44px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.06em; }
  .armor-select { flex: 1; min-width: 0; }
  .armor-warn { font-size: 11px; color: var(--danger); margin: 2px 0 8px; }
  .armor-hint { font-size: 10px; color: var(--ink-mute); font-style: italic; margin-top: 4px; line-height: 1.4; }
  .armor-ro { font-size: 12px; color: var(--ink-dim); display: flex; flex-direction: column; gap: 3px; }
  .party-card.offmap { border-style: dashed; opacity: 0.85; }
  .offmap-badge { font-size: 9px; font-weight: 700; letter-spacing: 0.04em; color: #1a1205; background: var(--gold); border-radius: 4px; padding: 1px 5px; margin-left: 6px; vertical-align: middle; }
  .req-card { background: var(--bg-1); border: 1px solid var(--gold-dim); border-radius: 10px; padding: 14px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5); animation: rollPop 0.3s; }
  .req-card-head { font-family: 'Cinzel', serif; font-weight: 700; color: var(--gold); font-size: 14px; }
  .req-icon { margin-right: 4px; }
  .req-card-who { font-weight: 600; margin-top: 2px; }
  .req-card-detail { font-size: 12px; color: var(--ink-dim); margin: 4px 0; }
  .req-card-timer { font-size: 10px; color: var(--ink-mute); margin-bottom: 8px; }
  .req-card-actions { display: flex; gap: 8px; justify-content: flex-end; }

  /* ===== v7.8 - player sheet request controls ===== */
  .btn.xs { padding: 2px 8px; font-size: 11px; border-radius: 5px; min-width: 0; }
  .req-inline { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  /* v7.8 FIX: stack the score over centered -/+ buttons so single- and
     double-digit scores align identically and the number stays centered
     (previously a wrapping row left the score off-centre and the buttons
     beside it for values < 10, but below it for >= 10). */
  .req-stat { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 100%; }
  .req-val, .req-stat-score { font-weight: 700; font-size: 15px; color: var(--ink); font-family: 'JetBrains Mono', monospace; line-height: 1; }
  .req-btns { display: inline-flex; gap: 4px; justify-content: center; }
  .req-pending { font-size: 10px; color: var(--gold); white-space: nowrap; }
  .csheet-ability.req { padding-bottom: 6px; }
  .csheet-ability.req .csheet-ability-mod { font-size: 22px; }
  .levelup-hp { margin-top: 12px; padding: 12px; border: 1px solid var(--gold-dim); border-radius: 8px;
    background: color-mix(in srgb, var(--gold) 8%, var(--bg-0)); }
  .levelup-hp > label { color: var(--gold); font-weight: 700; display: block; margin-bottom: 8px; }

  /* ===== v7.9 - player action request builder (token detail panel) ===== */
  .par-box { border-top: 1px solid var(--border-soft); padding-top: 10px; margin-top: 4px; }
  .par-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; color: var(--ink-dim); }
  .par-src { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; color: #1a1206; flex-shrink: 0; }
  .par-head-text strong { color: var(--ink); }
  .par-source-select { flex: 1; min-width: 0; font-size: 12px; padding: 3px 6px; background: var(--bg-0); border: 1px solid var(--gold-dim); border-radius: 6px; color: var(--gold-bright); }

  .par-modes { display: flex; gap: 4px; margin-bottom: 10px; }
  .par-mode { flex: 1; padding: 6px 4px; font-size: 12px; border-radius: 6px; border: 1px solid var(--border-soft); background: var(--bg-0); color: var(--ink-dim); cursor: pointer; font-family: 'Cinzel', serif; }
  .par-mode.active { border-color: var(--gold-dim); color: var(--gold-bright); background: color-mix(in srgb, var(--gold) 12%, var(--bg-0)); }
  .par-dice { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 8px; }
  .par-die { display: flex; align-items: center; gap: 3px; background: var(--bg-0); border: 1px solid var(--border-soft); border-radius: 6px; padding: 3px 4px; }
  .par-die-label { font-size: 11px; color: var(--ink-dim); width: 22px; font-family: 'JetBrains Mono', monospace; }
  .par-die-btn { width: 18px; height: 18px; border-radius: 4px; border: 1px solid var(--border-soft); background: var(--bg-2); color: var(--ink); cursor: pointer; font-size: 12px; line-height: 1; display: flex; align-items: center; justify-content: center; padding: 0; }
  .par-die-btn:disabled { opacity: 0.4; cursor: default; }

  .par-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .par-field { flex: 1; font-size: 10px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.06em; display: flex; flex-direction: column; gap: 3px; }
  .par-field input, .par-field select { font-size: 13px; padding: 4px 6px; }
  .par-send { width: 100%; margin-top: 2px; }
  /* v7.9 - weapon attack picker + preview inside the builder */
  .par-weapon-pick { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .par-wchip { font-size: 11px; padding: 4px 9px; border-radius: 12px; border: 1px solid var(--border-soft); background: var(--bg-0); color: var(--ink-dim); cursor: pointer; }
  .par-wchip.active { border-color: var(--gold-dim); background: color-mix(in srgb, var(--gold) 16%, var(--bg-0)); color: var(--gold-bright); font-weight: 600; }
  .par-wpreview { border: 1px solid var(--gold-dim); border-radius: 8px; padding: 10px; background: color-mix(in srgb, var(--gold) 6%, var(--bg-0)); margin-bottom: 4px; }
  .par-wp-line { font-size: 13px; margin-bottom: 2px; }
  .par-wp-meta { font-size: 11px; color: var(--ink-dim); margin-bottom: 6px; }
  .par-wp-comp { font-size: 12px; font-family: 'EB Garamond', serif; padding: 2px 0; }
  .par-wp-dice { color: var(--ink); }
  /* v8.2 - advantage/disadvantage + weapon effect */
  .par-adv { display: flex; gap: 6px; margin-bottom: 10px; }
  .par-adv-btn { flex: 1; font-size: 11px; padding: 5px 8px; border-radius: 7px; border: 1px solid var(--border-soft); background: var(--bg-0); color: var(--ink-dim); cursor: pointer; }
  .par-adv-btn.adv.on { border-color: #3fb84f; background: color-mix(in srgb, #3fb84f 18%, var(--bg-0)); color: #bff0c6; }
  .par-adv-btn.dis.on { border-color: var(--danger); background: color-mix(in srgb, var(--danger) 16%, var(--bg-0)); color: #f3c9c4; }
  .par-wp-effect { font-size: 12px; color: #c79be0; margin-top: 4px; }
  /* v8.1 - combat range gating + DM helpers */
  .par-range-note { font-size: 11px; text-align: center; color: var(--gold-bright); background: color-mix(in srgb, var(--gold) 10%, var(--bg-0)); border: 1px solid var(--gold-dim); border-radius: 6px; padding: 3px 8px; margin-bottom: 8px; }
  .par-range-note.far { color: var(--danger); background: color-mix(in srgb, var(--danger) 12%, var(--bg-0)); border-color: var(--danger); }
  .par-wchip.out { opacity: 0.4; text-decoration: line-through; cursor: not-allowed; }

  .par-oor { font-size: 11px; color: var(--danger); margin: 4px 0; text-align: center; font-weight: 600; }
  .par-send:disabled { opacity: 0.45; cursor: not-allowed; }
  .wpn-pull { width: 100%; margin-top: 8px; }
  /* v8.3 - movement actions */
  .move-actions { background: var(--bg-0); border: 1px solid var(--border-soft); border-radius: 6px; padding: 8px; }
  .move-actions-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 6px 0 4px; }
  .move-act { flex: 1 1 auto; min-width: 64px; padding: 7px 8px; border-radius: 6px; border: 1px solid var(--border-soft); background: var(--bg-1); color: var(--ink); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.12s; }
  .move-act:hover { border-color: var(--gold-dim); }
  .move-act.on { background: var(--gold); color: #1a1205; border-color: var(--gold-bright); }
  .move-actions-rem { font-size: 11px; color: var(--ink-dim); text-align: center; }

  .par-manual-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gold-bright); margin-bottom: 6px; }
  .par-manual-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }

  .par-manual-actions { display: flex; gap: 6px; margin-top: 4px; }

  /* v8.3 - maneuvers */

  .par-man { padding: 8px; border-radius: 6px; border: 1px solid var(--border-soft); background: var(--bg-1); color: var(--ink); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.12s; }
  .par-man:hover:not(:disabled) { border-color: var(--gold-dim); }
  .par-man.active { background: var(--gold); color: #1a1205; border-color: var(--gold-bright); }
  .par-man.out { opacity: 0.4; text-decoration: line-through; cursor: not-allowed; }
  .par-man-detail { background: var(--bg-0); border: 1px solid var(--border-soft); border-radius: 6px; padding: 8px; }
  .par-man-row { display: flex; gap: 8px; margin-bottom: 6px; }
  /* v8.3 - cinematic physical-dice save entry */

  .ar-tohit-sub { color: var(--ink-dim); font-size: 11px; font-family: 'JetBrains Mono', monospace; }

  .ar-vs-ac.hit { background: color-mix(in srgb, #3fb84f 28%, var(--bg-0)); color: #bff0c6; }
  .ar-vs-ac.miss { background: color-mix(in srgb, var(--danger) 24%, var(--bg-0)); color: #f3c9c4; }
  .ar-comps { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .ar-comp-row { display: flex; justify-content: center; }
  .ar-comp { display: inline-flex; flex-wrap: wrap; gap: 6px; align-items: center; justify-content: center; }
  .ar-comp-dice { background: var(--bg-0); border: 1px solid var(--border-soft); border-radius: 6px; padding: 3px 7px; font-size: 12px; font-family: 'JetBrains Mono', monospace; }
  .ar-comp-dice b { color: var(--gold-bright); }
  .ar-comp-mod { background: var(--bg-2); border-radius: 6px; padding: 3px 7px; font-size: 12px; font-family: 'JetBrains Mono', monospace; }

  /* ===== v8.0 - shared attack cinematic ===== */
  .acin-overlay { position: fixed; inset: 0; z-index: 4000; display: flex; align-items: center; justify-content: center; background: rgba(6,8,14,0.66); backdrop-filter: blur(3px); animation: acinFade 0.25s ease; }
  @keyframes acinFade { from { opacity: 0; } to { opacity: 1; } }

  @keyframes acinPop { from { transform: scale(0.85) translateY(10px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
  .acin-card.is-hit { border-color: #3fb84f; box-shadow: 0 0 0 1px rgba(63,184,79,0.4), 0 24px 70px rgba(0,0,0,0.6); }
